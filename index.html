<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subspace Prototype</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #6f6;
        font: 12px/1.4 monospace;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 0 2px #000;
      }
      #help {
        position: fixed;
        bottom: 8px;
        left: 8px;
        color: #888;
        font: 12px/1.4 monospace;
        pointer-events: none;
      }
      #killfeed {
        position: fixed;
        left: 20%;   /* text left edge ~20% across */
        bottom: 40%; /* ~40% up from the bottom */
        text-align: left;
        color: #fd6;
        font: 13px/1.5 monospace;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 0 3px #000;
      }
      #netdebug {
        position: fixed;
        top: 8px;
        right: 8px;
        text-align: right;
        color: #6cf;
        font: 11px/1.4 monospace;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 0 2px #000;
      }
      /* M2.5 network-simulator controls — pinned bottom-right, clear of the
         netdebug readout (top-right). Lifted above the radar minimap, which
         occupies the bottom-right corner, so the two never overlap. */
      #netsim {
        position: fixed;
        bottom: 256px;
        right: 8px;
        color: #6cf;
        font: 11px/1.6 monospace;
        text-shadow: 0 0 2px #000;
        background: rgba(0, 0, 0, 0.4);
        padding: 6px 8px;
        border: 1px solid #245;
        border-radius: 3px;
      }
      #netsim label.row {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
      }
      #netsim input[type="range"] {
        width: 90px;
        accent-color: #6cf;
      }
      #netsim .val {
        display: inline-block;
        width: 42px;
        text-align: right;
        color: #fd6;
      }
      #netsim .title {
        color: #888;
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="killfeed"></div>
    <div id="netdebug"></div>
    <div id="netsim">
      <div class="title">network sim (M2.5)</div>
      <label class="row"><span>enabled</span><input type="checkbox" id="ns-enabled" /></label>
      <label class="row"><span>latency</span><input type="range" id="ns-latency" min="0" max="400" step="10" /><span class="val" id="ns-latency-val"></span></label>
      <label class="row"><span>jitter</span><input type="range" id="ns-jitter" min="0" max="150" step="5" /><span class="val" id="ns-jitter-val"></span></label>
      <label class="row"><span>loss</span><input type="range" id="ns-loss" min="0" max="30" step="1" /><span class="val" id="ns-loss-val"></span></label>
    </div>
    <div id="help">arrows: rotate / thrust &nbsp;•&nbsp; Z (or ctrl): fire &nbsp;•&nbsp; Tab: bomb &nbsp;•&nbsp; shift: afterburner &nbsp;•&nbsp; F: fullscreen &nbsp;•&nbsp; R: radar zoom &nbsp;•&nbsp; W: warp ChaosBot &nbsp;•&nbsp;</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
